line-length = 120
target-version = "py311"
src = ["src"]

exclude = [
  ".git",
  ".mypy_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "__pypackages__",
  "dist",
  "node_modules",
  ".agents",
  ".agent",
  "images",
]

[lint.isort]
known-first-party = ["body", "cogtainer", "cli", "memory", "cogos"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint]
select = ["E", "F", "B", "I", "TID"]
ignore = [
  "D100",
  "D101",
  "D102",
  "D103",
  "D106",
  "D107",
  "E203",
]
fixable = ["E", "F", "B", "I"]
unfixable = []
extend-safe-fixes = ["E501"]

[lint.per-file-ignores]
".agents/**" = ["E501"]
".agent/**" = ["E501"]

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query"]
