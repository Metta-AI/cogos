name: Build Dashboard Image

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "src/dashboard/**"
      - "pyproject.toml"
      - ".github/workflows/docker-build-dashboard.yml"
      - ".github/actions/ecr-build/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  load-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Parse deploy targets
        id: targets
        run: |
          pip install pyyaml -q
          python -c "
          import yaml, json
          with open('cogtainers.ci.yml') as f:
              cfg = yaml.safe_load(f) or {}
          s3_bucket = cfg.get('ci_artifacts_bucket', 'cogtainer-ci-artifacts')
          targets = []
          for name, entry in (cfg.get('cogtainers') or {}).items():
              components = entry.get('components', 'all')
              if components == 'all' or 'dashboard' in components:
                  targets.append({
                      'name': name,
                      'ecr_repo': entry.get('ecr_repo', 'cogent'),
                      'aws_role': entry.get('aws_role', ''),
                      'region': entry.get('region', 'us-east-1'),
                      's3_bucket': s3_bucket,
                  })
          if not targets:
              targets = [{'name': 'default', 'ecr_repo': 'cogent', 'aws_role': '', 'region': 'us-east-1', 's3_bucket': s3_bucket}]
          print(json.dumps({'include': targets}))
          " > /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: load-targets
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Build and push dashboard image
        id: build
        uses: ./.github/actions/ecr-build
        with:
          image_name: ${{ matrix.ecr_repo }}
          dockerfile: dashboard/Dockerfile
          context: .
          aws_role: ${{ matrix.aws_role || vars.AWS_ROLE }}
          aws_region: ${{ matrix.region }}
          tag_prefix: dashboard

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Build frontend tarball
        run: |
          cd dashboard/frontend
          npm ci
          npx next build
          mkdir -p /tmp/frontend-pkg
          cp -a .next/standalone/. /tmp/frontend-pkg/
          [ -d .next/static ] && mkdir -p /tmp/frontend-pkg/.next && cp -r .next/static /tmp/frontend-pkg/.next/static
          [ -d public ] && cp -r public /tmp/frontend-pkg/public
          tar czf /tmp/frontend.tar.gz -C /tmp/frontend-pkg .
          echo "SIZE=$(du -h /tmp/frontend.tar.gz | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload frontend tarball to S3
        uses: ./.github/actions/s3-upload
        with:
          aws_role: ${{ matrix.aws_role || vars.AWS_ROLE }}
          aws_region: ${{ matrix.region }}
          source_path: /tmp/frontend.tar.gz
          s3_key: dashboard/${{ github.sha }}/frontend.tar.gz
          bucket: ${{ matrix.s3_bucket }}

      - name: Summary
        run: |
          echo "### Dashboard Built (${{ matrix.name }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Docker Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.build.outputs.image_uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Frontend Tarball:** \`s3://${{ matrix.s3_bucket }}/dashboard/${{ github.sha }}/frontend.tar.gz\` (${{ env.SIZE }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deploy:** \`cogtainer update <name> --services --image-tag dashboard-${{ steps.build.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  update-versions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate CI app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Get short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Update versions defaults (dashboard)
        uses: ./.github/actions/update-versions
        with:
          component: dashboard
          version: ${{ steps.vars.outputs.short_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update versions defaults (dashboard_frontend)
        uses: ./.github/actions/update-versions
        with:
          component: dashboard_frontend
          version: ${{ github.sha }}
          token: ${{ steps.app-token.outputs.token }}
