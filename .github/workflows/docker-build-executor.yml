name: Build Executor Image

on:
  push:
    branches: [main]
    paths:
      - "src/cogtainer/docker/**"
      - "src/cogos/**"
      - "src/cogents/**"
      - "pyproject.toml"
      - ".github/workflows/docker-build-executor.yml"
      - ".github/actions/ecr-build/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  load-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Parse deploy targets
        id: targets
        run: |
          pip install pyyaml -q
          python -c "
          import yaml, json
          with open('cogtainers.ci.yml') as f:
              cfg = yaml.safe_load(f) or {}
          s3_bucket = cfg.get('ci_artifacts_bucket', 'cogtainer-ci-artifacts')
          targets = []
          for name, entry in (cfg.get('cogtainers') or {}).items():
              components = entry.get('components', 'all')
              if components == 'all' or 'lambdas' in components:
                  targets.append({
                      'name': name,
                      'ecr_repo': entry.get('ecr_repo', 'cogent'),
                      'aws_role': entry.get('aws_role', ''),
                      'region': entry.get('region', 'us-east-1'),
                      's3_bucket': s3_bucket,
                  })
          if not targets:
              targets = [{'name': 'default', 'ecr_repo': 'cogent', 'aws_role': '', 'region': 'us-east-1', 's3_bucket': s3_bucket}]
          print(json.dumps({'include': targets}))
          " > /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: load-targets
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Build and push executor image
        id: build
        uses: ./.github/actions/ecr-build
        with:
          image_name: ${{ matrix.ecr_repo }}
          dockerfile: src/cogtainer/docker/Dockerfile
          context: .
          aws_role: ${{ matrix.aws_role || vars.AWS_ROLE }}
          aws_region: ${{ matrix.region }}
          tag_prefix: executor

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Package Lambda zip
        run: |
          DEPS_DIR=$(mktemp -d)
          uv pip install --target "$DEPS_DIR" --quiet --python 3.12 --python-platform linux \
            pydantic pydantic-settings pydantic-core annotated-types \
            Pillow google-genai anthropic asana

          cd src
          zip -qr /tmp/lambda.zip . -x '*/__pycache__/*' '*.pyc' '*.egg-info/*'
          cd "$DEPS_DIR"
          zip -qr /tmp/lambda.zip . -x '*/__pycache__/*' '*.pyc'

          echo "SIZE=$(du -h /tmp/lambda.zip | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload Lambda zip to S3
        uses: ./.github/actions/s3-upload
        with:
          aws_role: ${{ matrix.aws_role || vars.AWS_ROLE }}
          aws_region: ${{ matrix.region }}
          source_path: /tmp/lambda.zip
          s3_key: lambda/${{ github.sha }}/lambda.zip
          bucket: ${{ matrix.s3_bucket }}

      - name: Summary
        run: |
          echo "### Executor Built (${{ matrix.name }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Docker Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.build.outputs.image_uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Lambda Zip:** \`s3://${{ matrix.s3_bucket }}/lambda/${{ github.sha }}/lambda.zip\` (${{ env.SIZE }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deploy:** \`cogtainer update <name> --services --image-tag executor-${{ steps.build.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  update-versions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate CI app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Get short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Update versions defaults (executor)
        uses: ./.github/actions/update-versions
        with:
          component: executor
          version: ${{ steps.vars.outputs.short_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update versions defaults (lambda)
        uses: ./.github/actions/update-versions
        with:
          component: lambda
          version: ${{ github.sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update versions defaults (cogos)
        uses: ./.github/actions/update-versions
        with:
          component: cogos
          version: ${{ github.sha }}
          token: ${{ steps.app-token.outputs.token }}
