# CI deploy targets — each cogtainer gets its own ECR repo.
# GitHub Actions reads this to build a matrix of deploy targets.

ci_artifacts_bucket: cogtainer-ci-artifacts

cogtainers:
  agora:
    account_id: "815935788409"
    region: us-east-1
    ecr_repo: cogtainer-agora
    aws_role: "arn:aws:iam::815935788409:role/cogtainer-agora-ci"
    components: all
    cogents: [alpha]
